apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-pos-api
  labels:
    app: retail-pos-api
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail-pos-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: retail-pos-api
        environment: staging
    spec:
      containers:
        - name: api
          image: ghcr.io/retail/pos-phython:staging
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENV
              value: staging
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: retail-pos-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: retail-pos-secrets
                  key: redis-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-pos-secrets
                  key: jwt-secret
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: retail-pos-secrets
                  key: celery-broker-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: retail-pos-api
  labels:
    app: retail-pos-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: retail-pos-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: retail-pos-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: retail-pos-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
